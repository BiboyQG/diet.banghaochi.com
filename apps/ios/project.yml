name: NutritionTracker
options:
  bundleIdPrefix: com.banghaochi
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: 6.0
targets:
  NutritionTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NutritionTracker
    info:
      path: NutritionTracker/Info.plist
      properties:
        ACCESS_CALLBACK_SCHEME: diettracker
        ACCESS_LOGIN_URL: https://diet.banghaochi.com/auth/ios-callback
        API_BASE_URL: https://diet.banghaochi.com/api/v1/
        CFBundleDisplayName: Diet Tracker
        CFBundleURLTypes:
          - CFBundleURLName: com.banghaochi.diet
            CFBundleURLSchemes:
              - diettracker
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.banghaochi.diet
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  NutritionTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NutritionTrackerTests
    dependencies:
      - target: NutritionTracker
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.banghaochi.diet.tests
schemes:
  NutritionTracker:
    build:
      targets:
        NutritionTracker: all
    test:
      targets:
        - NutritionTrackerTests
      gatherCoverageData: true
    run:
      config: Debug
